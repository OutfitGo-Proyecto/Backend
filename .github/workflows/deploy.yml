name: Deploy Backend to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /home/ubuntu/backend
            git pull origin main

            docker compose down --remove-orphans
            docker compose up -d
            
            sleep 40
            
            docker compose exec -T app composer install

            # 1. Limpiamos cualquier caché de configuración vieja que tenga el 127.0.0.1 guardado
            docker compose exec -T app php artisan config:clear

            # 2. FORZAMOS la conexión apuntando directamente al contenedor 'laravel_db'
            docker compose exec -e DB_HOST=laravel_db -T app php artisan migrate:fresh --seed --force
