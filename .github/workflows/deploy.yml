name: Deploy Backend to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /home/ubuntu/backend
            git pull origin main

            # Limpieza suave para no borrar lo que ya ha descargado
            docker system prune -f

            # Reinicio y construcción
            docker compose down --remove-orphans
            docker compose up -d --build            
            
            # Espera de seguridad
            sleep 60
            
            # Instalación de librerías (Quitamos --no-dev para tener Faker y poder usar Seeders)
            docker compose exec -T app composer install --optimize-autoloader

            # Limpiar caché de configuración para que use el DB_HOST correcto
            docker compose exec -T app php artisan config:clear

            # Engaño a Laravel para que no falle con SQLite y forzamos MySQL
            docker compose exec -T app touch database/database.sqlite
            docker compose exec -T app php artisan migrate:fresh --seed --force --database=mysql
