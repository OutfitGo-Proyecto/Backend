name: Deploy Backend to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/backend
            git pull origin main

            # 1. LIMPIEZA RADICAL (Borra imágenes y contenedores huérfanos para liberar GBs)
            docker system prune -af

            # 2. REINICIO TOTAL
            docker compose down --remove-orphans
            docker compose up -d --build            
            
            # 3. ESPERA DE SEGURIDAD (60 segundos para que MySQL arranque bien)
            sleep 60
            
            # 4. INSTALACIÓN DE LIBRERÍAS (Arregla el fallo del autoload.php)
            docker compose exec -T app composer install

            # 5. CARGA DE PRODUCTOS (Borra todo y mete tus Nike, Adidas, etc.)
            docker compose exec -T app php artisan migrate:fresh --seed --force
