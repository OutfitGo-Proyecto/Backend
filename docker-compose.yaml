services:
    app:
        build: .
            context: ./home
            dockerfile: Dockerfile
        container_name: laravel
        tty: true
        restart: always
        ports:
            - "8000:8000"
        volumes:
            - ./home:/var/www/html
        command: sh -c "cd /var/www/html && php artisan serve --host=0.0.0.0 --port=8000"
        depends_on:
            - db

    nginx:
        image: nginx:stable-alpine
        container_name: laravel_nginx
        restart: always
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./docker/certs:/etc/nginx/certs
            - certbot_etc:/etc/letsencrypt
            - certbot_var:/var/lib/letsencrypt
            - ./docker/certbot/www:/var/www/certbot
        depends_on:
            - app

    certbot:
        image: certbot/certbot
        container_name: laravel_certbot
        volumes:
            - certbot_etc:/etc/letsencrypt
            - certbot_var:/var/lib/letsencrypt
            - ./docker/certbot/www:/var/www/certbot
        depends_on:
            - nginx

    db:
        image: mysql:8.0
        container_name: laravel_db
        restart: always
        volumes:
            - db_data:/var/lib/mysql
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: laravel
            MYSQL_USER: dwes
            MYSQL_PASSWORD: dwes

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: laravel_pma
        restart: always
        environment:
            PMA_HOST: db
            PMA_USER: root
            PMA_PASSWORD: root
        ports:
            - "8080:80"
        depends_on:
            - db

volumes:
    db_data:
    certbot_etc:
    certbot_var:
